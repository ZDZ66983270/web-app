# generic_fundamentals_core.yaml
# 通用企业财报核心字段模板 v1.0

version: 1.0
updated_at: "2026-02-02"

meta:
  scope: "non-bank_generic"
  comment: >
    该模板用于 VERA 通用企业（非银行）基本面事实表。
    字段划分为 5 大类：资产负债表、利润表、现金流、营运资本、每股与股本结构。
    required=true 表示：若长期缺失，将严重影响 VERA 的质量 / 估值引擎，应优先补齐。

fields:

  #######################################################
  # 1. 资产负债表 (Balance Sheet – Core)
  #######################################################

  - name: total_assets
    label_zh: "资产总额"
    description: "期末总资产；用于判断企业规模、资产周转率等。"
    category: "balance_sheet"
    required: true
    db_field: total_assets
    status: aligned

  - name: total_liabilities
    label_zh: "负债总额"
    description: "期末总负债；用于计算资产负债率、杠杆水平。"
    category: "balance_sheet"
    required: true
    db_field: total_liabilities
    status: aligned

  - name: common_equity_end
    label_zh: "期末股东权益"
    description: "期末普通股股东权益；用于计算 ROE、每股净资产等。"
    category: "balance_sheet"
    required: true
    db_field: common_equity_end
    status: aligned

  - name: cash_and_equivalents
    label_zh: "现金及现金等价物"
    description: "期末现金及现金等价物；衡量短期偿债能力和现金缓冲。"
    category: "balance_sheet"
    required: true
    db_field: cash_and_equivalents
    status: aligned

  - name: total_debt
    label_zh: "有息负债总额"
    description: "所有有息借款总额；用于计算净负债、杠杆倍数、利息保障倍数。"
    category: "balance_sheet"
    required: true
    db_field: total_debt
    status: aligned


  #######################################################
  # 2. 利润表 (Income Statement – Core Earnings)
  #######################################################

  - name: revenue_ttm
    label_zh: "营业收入（TTM）"
    description: "过去 12 个月累计营业收入；用于衡量规模与成长性。"
    category: "income_statement"
    required: true
    db_field: revenue_ttm
    status: aligned

  - name: net_income_attributable_to_common_ttm
    label_zh: "归母净利润（TTM）"
    description: "过去 12 个月归属于普通股股东的净利润；用于 EPS、ROE 与盈利质量。"
    category: "income_statement"
    required: true
    db_field: net_income_common_ttm
    status: aliased
    comment: "语义一致，仅命名风格差异"

  - name: gross_profit_ttm
    label_zh: "毛利（TTM）"
    description: "过去 12 个月毛利；用于计算毛利率，作为业务护城河的代理指标。"
    category: "income_statement"
    required: true
    db_field: gross_profit_ttm
    status: aligned

  - name: r_and_d_expense_ttm
    label_zh: "研发费用（TTM）"
    description: "过去 12 个月研发费用；用于估计再投资强度，尤其适用于科技 / 平台股。"
    category: "income_statement"
    required: false
    db_field: r_and_d_expense_ttm
    status: aligned

  - name: operating_profit_ttm
    label_zh: "营业利润（TTM）"
    description: "过去 12 个月营业利润；比净利润更接近经营真实盈利能力。"
    category: "income_statement"
    required: true
    db_field: operating_profit_ttm
    status: aligned

  - name: ebit_ttm
    label_zh: "息税前利润 EBIT（TTM）"
    description: "过去 12 个月息税前利润；用于利息保障倍数、资本结构敏感性分析。"
    category: "income_statement"
    required: true
    db_field: ebit_ttm
    status: aligned

  - name: interest_expense_ttm
    label_zh: "利息费用（TTM）"
    description: "过去 12 个月利息支出；结合 EBIT 计算利息保障倍数。"
    category: "income_statement"
    required: false
    db_field: interest_expense_ttm
    status: aligned

  - name: non_recurring_profit_ttm
    label_zh: "非经常性损益（TTM）"
    description: "过去 12 个月一次性/非经常性收益或损失；用于剔除'利润美化'，评估真实盈利质量。"
    category: "income_statement"
    required: false
    db_field: non_recurring_profit_ttm
    status: aligned


  #######################################################
  # 3. 现金流与投资 (Cashflow & Capex)
  #######################################################

  - name: operating_cashflow_ttm
    label_zh: "经营活动现金流净额（TTM）"
    description: "过去 12 个月经营性现金流；衡量利润的'含金量'和业务自我造血能力。"
    category: "cashflow"
    required: true
    db_field: operating_cashflow_ttm
    status: aligned

  - name: capex_ttm
    label_zh: "资本性支出 Capex（TTM）"
    description: "过去 12 个月资本性支出；用于估计再投资强度和未来产能扩张。"
    category: "cashflow"
    required: true
    db_field: capex_ttm
    status: aligned

  - name: free_cashflow_ttm
    label_zh: "自由现金流（TTM）"
    description: "过去 12 个月自由现金流（通常为 经营现金流 - Capex）；用于评估股东回报的可持续性。"
    category: "cashflow"
    required: true
    db_field: free_cashflow_ttm
    status: aligned

  - name: dividends_paid_cashflow
    label_zh: "已支付股利（现金流口径）"
    description: "过去 12 个月实际支付给股东的现金股利总额；用于评价分红与现金流是否匹配。"
    category: "cashflow"
    required: true
    db_field: dividends_paid_cashflow
    status: aligned

  - name: share_buyback_amount_ttm
    label_zh: "股份回购金额（TTM）"
    description: "过去 12 个月用于回购股份的现金支出；反映公司通过回购进行的股东回报与稀释控制。"
    category: "cashflow"
    required: false
    db_field: share_buyback_amount_ttm
    status: aligned


  #######################################################
  # 4. 营运资本 (Working Capital – Core Signals)
  #######################################################

  - name: accounts_receivable_end
    label_zh: "应收账款期末余额"
    description: "期末应收账款；用于识别应收压力、账期拉长与潜在坏账风险。"
    category: "working_capital"
    required: false
    db_field: accounts_receivable_end
    status: aligned

  - name: inventory_end
    label_zh: "存货期末余额"
    description: "期末存货；用于衡量去库存压力、需求放缓或周期拐点信号。"
    category: "working_capital"
    required: false
    db_field: inventory_end
    status: aligned

  - name: accounts_payable_end
    label_zh: "应付账款期末余额"
    description: "期末应付账款；用于观察对供应商的议价能力及是否通过拖欠货款维持现金流。"
    category: "working_capital"
    required: false
    db_field: accounts_payable_end
    status: aligned


  #######################################################
  # 5. 每股与股本结构 (Per-share & Capital Structure)
  #######################################################

  - name: eps_ttm
    label_zh: "每股收益 EPS（TTM）"
    description: "过去 12 个月每股收益；作为 VERA_PE_TTM 计算与估值锚点。"
    category: "per_share"
    required: true
    db_field: eps
    status: aliased
    comment: "DB字段实际存储TTM数据"

  - name: shares_outstanding_common_end
    label_zh: "期末普通股股本"
    description: "期末普通股已发行在外股数；用于 EPS、每股指标及股本稀释分析。"
    category: "per_share"
    required: true
    db_field: shares_outstanding_common_end
    status: aligned

  - name: dividend_per_share
    label_zh: "每股股利（TTM）"
    description: "过去 12 个月每股分红总额；用于股息率与分红一致性分析。"
    category: "per_share"
    required: false
    db_field: dividend_per_share
    status: aligned
